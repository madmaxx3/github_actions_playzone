name: YAML Playground

on:
  push:
  workflow_dispatch:

# 🌍 1. Workflow-level ENV (global)
env:
  GLOBAL_ENV: "I am global"

jobs:
  explore_1:
    runs-on: ubuntu-latest

    # 🧱 2. Job-level ENV
    env:
      JOB_ENV: "I am job level"

    steps:
      # 🔍 Machine details (Job 1)
      - name: Show machine details (Job 1)
        run: |
          echo "=== JOB 1 MACHINE INFO ==="
          echo "Hostname: $(hostname)"
          echo "IP Address:"
          hostname -I || ip addr
          echo "OS:"
          uname -a
          echo "=========================="

      # 🌍 Access global + job env
      - name: Step - Print ENV hierarchy
        run: |
          echo "GLOBAL_ENV: $GLOBAL_ENV"
          echo "JOB_ENV: $JOB_ENV"

      # 🧩 3. Step-level ENV
      - name: Step with local env
        env:
          STEP_ENV: "I am step level"
        run: |
          echo "STEP_ENV: $STEP_ENV"
          echo "GLOBAL_ENV: $GLOBAL_ENV"
          echo "JOB_ENV: $JOB_ENV"

      # 🔐 4. Secrets usage
      - name: Use secrets safely
        env:
          MY_SECRET: ${{ secrets.MY_SECRET }}
        run: |
          echo "Secret exists but masked"
          echo "Length of secret:"
          echo "${#MY_SECRET}"

      # 🔥 Create a file
      - name: Step - Create file
        run: |
          echo "This is sample data from Job 1" > data.txt
          echo "Created file:"
          cat data.txt

      # 🔥 Save machine identity
      - name: Step - Save machine identity
        run: |
          hostname > machine.txt
          echo "Saved machine identity:"
          cat machine.txt

      # 🔥 Upload artifact
      - name: Step - Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-uploadable-file
          path: |
            data.txt
            machine.txt

  process_1:
    runs-on: ubuntu-latest
    needs: explore

    # 🧱 Job-level ENV (Job 2)
    env:
      JOB2_ENV: "Second job env"

    steps:
      # 🔍 Machine details (Job 2)
      - name: Show machine details (Job 2)
        run: |
          echo "=== JOB 2 MACHINE INFO ==="
          echo "Hostname: $(hostname)"
          echo "IP Address:"
          hostname -I || ip addr
          echo "OS:"
          uname -a
          echo "=========================="

      # 🌍 Access ENV again
      - name: Print ENV in Job 2
        run: |
          echo "GLOBAL_ENV: $GLOBAL_ENV"
          echo "JOB2_ENV: $JOB2_ENV"

      # 🔐 Secrets again
      - name: Use API KEY
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "API key is masked"
          echo "Length:"
          echo "${#API_KEY}"

      # 🔥 Download artifact
      - name: Step - Download artifact
        uses: actions/download-artifact@v4
        with:
          name: my-uploadable-file

      # 🔥 Compare machines + process file
      - name: Step - Compare and process
        run: |
          echo "=== MACHINE COMPARISON ==="
          echo "Previous Job Machine:"
          cat machine.txt
          echo "Current Job Machine:"
          hostname

          echo "=== FILE CONTENT ==="
          cat data.txt

          echo "Appending new data..."
          echo "Processed in second job" >> data.txt

          echo "=== UPDATED CONTENT ==="
          cat data.txt 
