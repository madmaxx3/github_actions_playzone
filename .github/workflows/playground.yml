name: YAML Playground

on:
  push:
  workflow_dispatch:

jobs:
  explore:
    runs-on: ubuntu-latest

    steps:
      # 🔍 Machine details (Job 1)
      - name: Show machine details (Job 1)
        run: |
          echo "=== JOB 1 MACHINE INFO ==="
          echo "Hostname: $(hostname)"
          echo "IP Address:"
          hostname -I || ip addr
          echo "OS:"
          uname -a
          echo "=========================="

      # 1. Basic execution
      - name: Step 1 - Hello
        run: echo "Hello from GitHub Actions"

      # 2. Multiple commands
      - name: Step 2 - Multi command
        run: |
          echo "Line 1"
          echo "Line 2"
          pwd
          ls -la

      # 3. Environment variables
      - name: Step 3 - Env vars
        env:
          NAME: madmax
        run: echo "Hello $NAME"

      # 4. GitHub context
      - name: Step 4 - GitHub context
        run: |
          echo "Repo: $GITHUB_REPOSITORY"
          echo "Branch: $GITHUB_REF"
          echo "Actor: $GITHUB_ACTOR"

      # 🔥 5. Create a file
      - name: Step 5 - Create file
        run: |
          echo "This is sample data" > data.txt
          echo "Created file:"
          cat data.txt

      # 🔥 6. Save machine identity
      - name: Step 6 - Save machine identity
        run: |
          hostname > machine.txt

      # 🔥 7. Upload artifact
      - name: Step 7 - Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-uploadable-file
          path: |
            data.txt
            machine.txt

  process:
    runs-on: ubuntu-latest
    needs: explore

    steps:
      # 🔍 Machine details (Job 2)
      - name: Show machine details (Job 2)
        run: |
          echo "=== JOB 2 MACHINE INFO ==="
          echo "Hostname: $(hostname)"
          echo "IP Address:"
          hostname -I || ip addr
          echo "OS:"
          uname -a
          echo "=========================="

      # 🔥 8. Download artifact
      - name: Step 8 - Download artifact
        uses: actions/download-artifact@v4
        with:
          name: my-uploadable-file

      # 🔥 9. Compare machines + process file
      - name: Step 9 - Compare and process
        run: |
          echo "=== MACHINE COMPARISON ==="
          echo "Previous Job Machine:"
          cat machine.txt
          echo "Current Job Machine:"
          hostname

          echo "=== FILE CONTENT ==="
          cat data.txt

          echo "Appending new data..."
          echo "Processed in second job" >> data.txt

          echo "=== UPDATED CONTENT ==="
          cat data.txt
